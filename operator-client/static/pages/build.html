<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Build Beacon</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <span class="logo">BEBOP // C2</span>
        <nav>
            <a href="/sessions">Sessions</a>
            <a href="/listeners">Listeners</a>
            <a href="/build" class="active">Build</a>
        </nav>
        <div class="conn-indicator">
            <span class="conn-dot" id="conn-dot"></span>
            <span id="conn-status">OFFLINE</span>
        </div>
        <div class="header-actions">
            <button type="button" class="icon-btn" onclick="openSettings()" title="Teamserver connection">
                <svg class="icon-btn-svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="icon-btn-text">settings</span>
            </button>
        </div>
    </header>
    <main class="build-main">
        <h2>Build Beacon</h2>
        <div class="form-section">
            <div class="form-card">
                <div class="form-row">
                    <label for="buildListener">Listener</label>
                    <select id="buildListener" onchange="onListenerSelect(this)">
                        <option value="">— select a listener —</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Sleep Interval</label>
                    <div class="sleep-fields">
                        <div class="sleep-unit">
                            <input id="buildSleepDays" type="number" min="0" max="365" value="0">
                            <span class="sleep-label">Days</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepHours" type="number" min="0" max="23" value="0">
                            <span class="sleep-label">Hours</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepMins" type="number" min="0" max="59" value="0">
                            <span class="sleep-label">Minutes</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepSecs" type="number" min="0" max="59" value="5">
                            <span class="sleep-label">Seconds</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <label for="buildJitter">Jitter (%)</label>
                    <input id="buildJitter" type="number" min="0" max="100" placeholder="20" value="20">
                </div>
                <div class="form-row">
                    <label for="buildFormat">Output Format</label>
                    <select id="buildFormat" onchange="document.getElementById('build-btn').textContent='Compile beacon.'+this.value">
                        <option value="exe">Windows Executable (.exe)</option>
                        <option value="bin">Raw Shellcode (.bin)</option>
                    </select>
                </div>
                <button id="build-btn" class="btn-primary" onclick="buildBeacon()">
                    Compile beacon.exe
                </button>
                <div id="build-status" class="build-status"></div>
            </div>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
