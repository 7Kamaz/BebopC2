<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Build Beacon</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <span class="logo">BEBOP // C2</span>
        <nav>
            <a href="/sessions">Sessions</a>
            <a href="/listeners">Listeners</a>
            <a href="/build" class="active">Build</a>
        </nav>
        <div class="conn-indicator">
            <span class="conn-dot" id="conn-dot"></span>
            <span id="conn-status">OFFLINE</span>
        </div>
        <div class="settings">
            <label>Teamserver</label>
            <input id="tsIp"   type="text" placeholder="192.168.1.100" title="IP or hostname">
            <span class="sep">:</span>
            <input id="tsPort" type="text" placeholder="8080" title="Port">
            <button onclick="saveSettings()">Connect</button>
        </div>
    </header>
    <main class="build-main">
        <h2>Build Beacon</h2>
        <div class="form-section">
            <div class="form-card">
                <div class="form-row">
                    <label for="buildListener">Listener</label>
                    <select id="buildListener" onchange="onListenerSelect(this)">
                        <option value="">— select a listener —</option>
                    </select>
                </div>
                <div class="form-row">
                    <label>Sleep Interval</label>
                    <div class="sleep-fields">
                        <div class="sleep-unit">
                            <input id="buildSleepDays" type="number" min="0" max="365" value="0">
                            <span class="sleep-label">Days</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepHours" type="number" min="0" max="23" value="0">
                            <span class="sleep-label">Hours</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepMins" type="number" min="0" max="59" value="0">
                            <span class="sleep-label">Minutes</span>
                        </div>
                        <div class="sleep-unit">
                            <input id="buildSleepSecs" type="number" min="0" max="59" value="5">
                            <span class="sleep-label">Seconds</span>
                        </div>
                    </div>
                </div>
                <div class="form-row">
                    <label for="buildJitter">Jitter (%)</label>
                    <input id="buildJitter" type="number" min="0" max="100" placeholder="20" value="20">
                </div>
                <div class="form-row">
                    <label for="buildFormat">Output Format</label>
                    <select id="buildFormat" onchange="document.getElementById('build-btn').textContent='Compile beacon.'+this.value">
                        <option value="exe">Windows Executable (.exe)</option>
                        <option value="bin">Raw Shellcode (.bin)</option>
                    </select>
                </div>
                <button id="build-btn" class="btn-primary" onclick="buildBeacon()">
                    Compile beacon.exe
                </button>
                <div id="build-status" class="build-status"></div>
            </div>
        </div>
    </main>
    <script src="/static/js/app.js"></script>
</body>
</html>
