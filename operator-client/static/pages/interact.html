<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interact</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .xterm-viewport::-webkit-scrollbar              { width: 8px !important; }
        .xterm-viewport::-webkit-scrollbar-track        { background: #0a0e1a !important; }
        .xterm-viewport::-webkit-scrollbar-thumb        { background: #ffb000 !important; border-radius: 0 !important; border: none !important; }
        .xterm-viewport::-webkit-scrollbar-thumb:hover  { background: #ffd060 !important; }
        .xterm-viewport { scrollbar-width: thin !important; scrollbar-color: #ffb000 #0a0e1a !important; }
    </style>
</head>
<body class="interact-page" data-page="interact">
    <header>
        <a href="/sessions" class="back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg><span style="margin-top:2px">SESSIONS</span></a>
        <span class="logo">BEBOP // C2</span>
        <div id="beacon-info" class="beacon-info">Loading&hellip;</div>
        <div class="session-elapsed" id="session-elapsed">00:00:00</div>
    </header>
    <div id="terminal"></div>
    <input type="file" id="upload-picker" style="display:none">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
